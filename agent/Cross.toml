# Cross.toml — cross-rs configuration for agent cross-compilation.
# Installs libudev-dev inside each Docker container so the `serialport`
# crate can link against it.
#
# For cross-compilation targets the target-architecture package must be
# installed (e.g. libudev-dev:arm64), otherwise the linker picks up the
# host x86_64 library and fails with "file format not recognized".
#
# Additionally, a <triple>-pkg-config wrapper script is created so that
# the Rust `pkg-config` crate finds the correct library paths for the
# target architecture instead of the host's x86_64 paths.

[target.x86_64-unknown-linux-gnu]
pre-build = ["apt-get update && apt-get install -y libudev-dev"]

[target.aarch64-unknown-linux-gnu]
pre-build = ["""
dpkg --add-architecture arm64 \
&& apt-get update \
&& apt-get install -y libudev-dev:arm64 \
&& printf '#!/bin/sh\\nPKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 exec pkg-config "$@"\\n' \
   > /usr/local/bin/aarch64-linux-gnu-pkg-config \
&& chmod +x /usr/local/bin/aarch64-linux-gnu-pkg-config
"""]

[target.armv7-unknown-linux-gnueabihf]
pre-build = ["""
dpkg --add-architecture armhf \
&& apt-get update \
&& apt-get install -y libudev-dev:armhf \
&& printf '#!/bin/sh\\nPKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 exec pkg-config "$@"\\n' \
   > /usr/local/bin/arm-linux-gnueabihf-pkg-config \
&& chmod +x /usr/local/bin/arm-linux-gnueabihf-pkg-config
"""]

[target.x86_64-unknown-linux-musl]
pre-build = ["apt-get update && apt-get install -y libudev-dev"]

[target.aarch64-unknown-linux-musl]
pre-build = ["""
dpkg --add-architecture arm64 \
&& apt-get update \
&& apt-get install -y libudev-dev:arm64 \
&& printf '#!/bin/sh\\nPKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 exec pkg-config "$@"\\n' \
   > /usr/local/bin/aarch64-linux-gnu-pkg-config \
&& chmod +x /usr/local/bin/aarch64-linux-gnu-pkg-config
"""]

[target.armv7-unknown-linux-musleabihf]
pre-build = ["""
dpkg --add-architecture armhf \
&& apt-get update \
&& apt-get install -y libudev-dev:armhf \
&& printf '#!/bin/sh\\nPKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 exec pkg-config "$@"\\n' \
   > /usr/local/bin/arm-linux-gnueabihf-pkg-config \
&& chmod +x /usr/local/bin/arm-linux-gnueabihf-pkg-config
"""]
