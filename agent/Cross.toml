# Cross.toml — cross-rs configuration for agent cross-compilation.
#
# Each target uses a locally pre-built image (see agent/docker/) that extends
# the official cross-rs base image with the libudev-dev package required by the
# `serialport` crate.  Run `scripts/setup-agent-cross.sh` (Linux/macOS) or
# `scripts/setup-agent-cross.cmd` (Windows) once to build these images before
# running build-agents.sh / build-agents.cmd.
#
# Using `image` instead of `pre-build` hooks avoids cross-rs having to build a
# Docker image at compile time, which fails on Windows with Podman because
# Podman Machine (WSL2) cannot access Windows-side build contexts (/mnt/c/...).

[target.x86_64-unknown-linux-musl]
image = "localhost/termihub-cross:x86_64-unknown-linux-musl"

[target.aarch64-unknown-linux-musl]
image = "localhost/termihub-cross:aarch64-unknown-linux-musl"
