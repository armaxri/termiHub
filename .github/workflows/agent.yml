name: Agent

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'agent/**'
      - 'core/**'
      - 'Cargo.toml'
  push:
    branches: [ main ]
    paths:
      - 'agent/**'
      - 'core/**'
      - 'Cargo.toml'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: termihub-agent-linux-x64
          - target: aarch64-unknown-linux-musl
            artifact_name: termihub-agent-linux-arm64
          - target: armv7-unknown-linux-musleabihf
            artifact_name: termihub-agent-linux-armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-rs
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xz -C /usr/local/bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build custom cross-rs image
        uses: docker/build-push-action@v5
        with:
          context: agent/docker
          file: agent/docker/Dockerfile.${{ matrix.target }}
          tags: localhost/termihub-cross:${{ matrix.target }}
          load: true
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Build
        env:
          TERMIHUB_BUILD_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: CROSS_CONFIG=agent/Cross.toml cross build --release --target ${{ matrix.target }} -p termihub-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/termihub-agent
          if-no-files-found: error
          retention-days: 7

  # ── Publish a short-lived pre-release for PR branch builds ────────────────
  # Only runs on pull_request events so feature branches get a downloadable
  # release at tag  agent-branch-{sanitized-branch}.  The release is replaced
  # on every push to the branch and cleaned up when the branch is deleted
  # (see agent-cleanup.yml).
  publish-branch-release:
    name: Publish Branch Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Sanitize branch name
        id: tag
        run: |
          BRANCH="${{ github.head_ref }}"
          SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
          echo "value=agent-branch-${SANITIZED}" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Download all agent artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Delete existing branch release (if any)
        run: gh release delete "${{ steps.tag.outputs.value }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create branch release
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          gh release create "${{ steps.tag.outputs.value }}" \
            artifacts/* \
            --prerelease \
            --title "Branch build: ${{ steps.tag.outputs.branch }} @ ${SHORT_SHA}" \
            --notes "$(printf '## Branch Build\n\nBranch: \`${{ steps.tag.outputs.branch }}\`\nCommit: [\`%s\`](%s)\nBuilt: %s\n\nThis pre-release is updated on every push to the branch and deleted when the branch is removed. **Not for production use.**' "${SHORT_SHA}" "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" "${DATE}")"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
