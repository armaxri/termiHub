name: Agent

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'agent/**'
      - 'core/**'
      - 'Cargo.toml'
  push:
    branches: [ main ]
    paths:
      - 'agent/**'
      - 'core/**'
      - 'Cargo.toml'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: termihub-agent-linux-x64
          - target: aarch64-unknown-linux-musl
            artifact_name: termihub-agent-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-rs
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xz -C /usr/local/bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build custom cross-rs image
        uses: docker/build-push-action@v5
        with:
          context: agent/docker
          file: agent/docker/Dockerfile.${{ matrix.target }}
          tags: localhost/termihub-cross:${{ matrix.target }}
          load: true
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Build
        run: CROSS_CONFIG=agent/Cross.toml cross build --release --target ${{ matrix.target }} -p termihub-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/termihub-agent
          if-no-files-found: error
          retention-days: 7
