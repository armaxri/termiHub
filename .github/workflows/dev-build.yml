name: Dev Build

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  # ── 1. Determine release tag ────────────────────────────────────────────────
  prepare-release:
    name: Prepare Dev Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      branch: ${{ steps.vars.outputs.branch }}

    steps:
      - name: Set release variables
        id: vars
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            TAG="dev-latest"
          else
            TAG="dev-${BRANCH}-latest"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  # ── 2. Build and stage desktop app artifacts ───────────────────────────────
  build-app:
    name: Build App - ${{ matrix.platform }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel
          - platform: macos-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            file_ext: .dmg
            bundle_path: dmg

          # macOS Apple Silicon
          - platform: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            file_ext: .dmg
            bundle_path: dmg

          # Windows x64
          - platform: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            file_ext: .msi
            bundle_path: msi

          # Linux x64
          - platform: linux-x64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            file_ext: .AppImage
            bundle_path: appimage

          # Linux ARM64 — AppImage not supported on ARM64 (linuxdeploy is x86_64-only)
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            file_ext: .deb
            bundle_path: deb
            extra_args: '--bundles deb,rpm'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: dev-build-${{ matrix.platform }}

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TERMIHUB_DEV_BUILD: 'true'
          TERMIHUB_BUILD_BRANCH: ${{ needs.prepare-release.outputs.branch }}
        with:
          tagName: ''
          releaseName: ''
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }} ${{ matrix.extra_args }}

      # Tauri applies an ad-hoc ('-') signature by default on macOS. Ad-hoc signatures
      # are machine-local: on any other machine Gatekeeper treats the app as damaged
      # rather than showing the bypassable security warning. Strip the signature so the
      # app is fully unsigned — Gatekeeper then shows "cannot be opened because Apple
      # cannot check it for malicious software", which users can bypass via System Settings.
      - name: Strip ad-hoc signature from macOS DMG
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          DMG=$(find "target/${{ matrix.rust_target }}/release/bundle/dmg" -name "*.dmg" | head -n 1)
          WORKDIR=$(mktemp -d)
          MOUNT="$WORKDIR/mount"
          mkdir "$MOUNT"

          hdiutil attach "$DMG" -mountpoint "$MOUNT" -nobrowse -quiet
          APP_NAME=$(ls "$MOUNT" | grep '\.app$' | head -n 1)
          cp -r "$MOUNT/$APP_NAME" "$WORKDIR/"
          hdiutil detach "$MOUNT" -quiet

          APP="$WORKDIR/$APP_NAME"
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --remove-signature {} \; 2>/dev/null || true
          find "$APP/Contents/MacOS" -type f \
            -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature "$APP" 2>/dev/null || true

          rm "$DMG"
          hdiutil create -volname "termiHub" -srcfolder "$APP" -ov -format UDZO "$DMG"
          rm -rf "$WORKDIR"

      - name: Collect primary artifact
        shell: bash
        run: |
          ARTIFACT=$(find "target/${{ matrix.rust_target }}/release/bundle/${{ matrix.bundle_path }}" -name "*${{ matrix.file_ext }}" | head -n 1)
          if [ -z "$ARTIFACT" ]; then
            echo "Error: No artifact found matching *${{ matrix.file_ext }} in bundle/${{ matrix.bundle_path }}"
            exit 1
          fi
          cp "$ARTIFACT" "termiHub-dev-${{ matrix.platform }}${{ matrix.file_ext }}"

      - name: Collect NSIS setup.exe (Windows only)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: |
          NSIS=$(find "target/${{ matrix.rust_target }}/release/bundle/nsis" -name "*-setup.exe" | head -n 1)
          if [ -n "$NSIS" ]; then
            cp "$NSIS" "termiHub-dev-${{ matrix.platform }}-setup.exe"
          fi

      - name: Collect .deb (Linux x64 only)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          DEB=$(find "target/${{ matrix.rust_target }}/release/bundle/deb" -name "*.deb" | head -n 1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "termiHub-dev-${{ matrix.platform }}.deb"
          fi

      - name: Collect .rpm (Linux arm64 only)
        if: matrix.platform == 'linux-arm64'
        shell: bash
        run: |
          RPM=$(find "target/${{ matrix.rust_target }}/release/bundle/rpm" -name "*.rpm" | head -n 1)
          if [ -n "$RPM" ]; then
            cp "$RPM" "termiHub-dev-${{ matrix.platform }}.rpm"
          fi

      - name: Upload app artifacts to staging
        uses: actions/upload-artifact@v7
        with:
          name: app-${{ matrix.platform }}
          path: termiHub-dev-${{ matrix.platform }}*
          if-no-files-found: error

  # ── 3. Build and stage agent binaries ─────────────────────────────────────
  build-agents:
    name: Agent Binary (${{ matrix.target }})
    needs: prepare-release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: termihub-agent-linux-x64
          - target: aarch64-unknown-linux-musl
            artifact_name: termihub-agent-linux-arm64
          - target: armv7-unknown-linux-musleabihf
            artifact_name: termihub-agent-linux-armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: dev-agent-${{ matrix.target }}

      - name: Install cross-rs
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xz -C /usr/local/bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build custom cross-rs image
        uses: docker/build-push-action@v5
        with:
          context: agent/docker
          file: agent/docker/Dockerfile.${{ matrix.target }}
          tags: localhost/termihub-cross:${{ matrix.target }}
          load: true
          cache-from: type=gha,scope=dev-agent-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=dev-agent-${{ matrix.target }}

      - name: Build agent
        env:
          TERMIHUB_BUILD_BRANCH: ${{ github.ref_name }}
        run: CROSS_CONFIG=agent/Cross.toml cross build --release --target ${{ matrix.target }} -p termihub-agent

      - name: Rename agent binary
        run: cp "target/${{ matrix.target }}/release/termihub-agent" "${{ matrix.artifact_name }}"

      - name: Upload agent binary to staging
        uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  # ── 4. Atomically publish release once all artifacts are staged ────────────
  publish-release:
    name: Publish Dev Release
    needs: [prepare-release, build-app, build-agents]
    runs-on: ubuntu-latest
    # Run even if some build jobs failed so the release is always updated
    if: ${{ !cancelled() && needs.prepare-release.result == 'success' }}

    steps:
      - name: Download all staged artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Delete existing dev release (if any)
        run: gh release delete "${{ needs.prepare-release.outputs.tag }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Write release notes
        run: |
          BRANCH="${{ needs.prepare-release.outputs.branch }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "## ⚠️ Dev Build — Not for Production Use"
            echo ""
            echo "This is an automated development build from the \`${BRANCH}\` branch."
            echo ""
            echo "**Commit**: [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
            echo "**Built**: ${DATE}"
            echo ""
            echo "These artifacts are rebuilt automatically on every push to \`${BRANCH}\` and overwrite the previous build. They may be unstable or contain incomplete features. **Do not use in production.**"
            echo ""
            echo "### Desktop Installers"
            echo "| Platform | Artifact |"
            echo "|----------|---------|"
            echo "| macOS Intel | \`termiHub-dev-macos-x64.dmg\` |"
            echo "| macOS Apple Silicon | \`termiHub-dev-macos-arm64.dmg\` |"
            echo "| Windows x64 | \`termiHub-dev-windows-x64.msi\`, \`termiHub-dev-windows-x64-setup.exe\` |"
            echo "| Linux x64 | \`termiHub-dev-linux-x64.AppImage\`, \`termiHub-dev-linux-x64.deb\` |"
            echo "| Linux ARM64 | \`termiHub-dev-linux-arm64.deb\`, \`termiHub-dev-linux-arm64.rpm\` |"
            echo ""
            echo "> **macOS — security warning on first launch.** These builds are unsigned (no Apple Developer"
            echo "> account). macOS will block the app with _\"cannot be opened because Apple cannot check it"
            echo "> for malicious software\"_. To bypass: open **System Settings → Privacy \& Security** and"
            echo "> click **Open Anyway**. This is a one-time step per download."
            echo ""
            echo "### Agent Binaries (Static musl)"
            echo "| Target | Artifact |"
            echo "|--------|---------|"
            echo "| Linux x64 | \`termihub-agent-linux-x64\` |"
            echo "| Linux ARM64 | \`termihub-agent-linux-arm64\` |"
            echo "| Linux ARMv7 | \`termihub-agent-linux-armv7\` |"
          } > release_notes.md

      - name: Create and publish dev release
        run: |
          BRANCH="${{ needs.prepare-release.outputs.branch }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          ARTIFACT_ARGS=()
          while IFS= read -r -d '' f; do
            ARTIFACT_ARGS+=("$f")
          done < <(find artifacts/ -maxdepth 1 -type f -print0 2>/dev/null)
          gh release create "${{ needs.prepare-release.outputs.tag }}" \
            "${ARTIFACT_ARGS[@]}" \
            --prerelease \
            --title "Dev Build — not for production use (${BRANCH} @ ${SHORT_SHA})" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
