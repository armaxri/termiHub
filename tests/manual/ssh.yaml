category: ssh
display_name: "SSH"

tests:
  # --- Agnoster/Powerline theme rendering (PR #197) ---

  - id: MT-SSH-01
    name: "Agnoster theme renders without black rectangle"
    pr: 197
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Connect via SSH to a Linux machine with zsh + Agnoster theme"
      - "Observe the user@machine prompt segment"
    expected:
      - "Prompt segment blends with terminal background"
      - "No visible black rectangle behind user@machine segment"
    verification: manual
    tags: [visual]

  - id: MT-SSH-02
    name: "Default bash prompt renders correctly"
    pr: 197
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    setup:
      - create_connection:
          name: "SSH Bash Prompt Test"
          type: ssh
          config:
            host: "127.0.0.1"
            port: 2201
            username: "testuser"
            authMethod: password
      - connect: "SSH Bash Prompt Test"
    instructions:
      - "Enter password 'testpass' when prompted"
      - "Observe the default bash prompt"
    expected:
      - "No visual regression in prompt rendering"
    verification: manual
    tags: [visual]

  - id: MT-SSH-03
    name: "Local shell ANSI colors unaffected"
    pr: 197
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Open a local shell terminal"
      - "Run a command that produces colored output (e.g., 'ls --color')"
    expected:
      - "ANSI color rendering is unaffected"
    verification: manual
    tags: [visual]

  # --- SSH key authentication on Windows (PR #160) ---

  - id: MT-SSH-07
    name: "SSH agent auth still works"
    pr: 160
    platforms: [windows]
    prerequisites:
      - app: true
    instructions:
      - "Ensure SSH agent is running with a key loaded"
      - "Create an SSH connection with agent auth method"
      - "Connect"
    expected:
      - "SSH agent auth works"
    verification: manual

  # --- SSH agent setup guidance (PR #133) ---

  - id: MT-SSH-09
    name: "Setup SSH Agent button opens PowerShell"
    pr: 133
    platforms: [windows]
    prerequisites:
      - app: true
    instructions:
      - "Open connection editor, select SSH + Agent auth"
      - "Click 'Setup SSH Agent' button"
    expected:
      - "Local PowerShell tab opens with elevation command"
    verification: manual

  # --- X11 forwarding (PR #69) ---

  - id: MT-SSH-14
    name: "Docker SSH + X11 connection works"
    pr: 69
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Connect via 'Docker SSH + X11' example connection"
      - "Verify the SSH session opens"
    expected:
      - "SSH connection with X11 forwarding succeeds"
    verification: manual

  - id: MT-SSH-15
    name: "X11 app window appears on local display"
    pr: 69
    platforms: [macos, linux]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "From the X11 SSH session, run: xclock"
      - "Or try: xeyes"
    expected:
      - "Window appears on local display"
    verification: manual

  - id: MT-SSH-16
    name: "DISPLAY variable set correctly"
    pr: 69
    platforms: [macos, linux]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "From the X11 SSH session, run: echo $DISPLAY"
    expected:
      - "Shows localhost:N.0 on remote"
    verification: manual

  - id: MT-SSH-18
    name: "X11 graceful degradation without X server"
    pr: 69
    platforms: [windows]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Enable X11 forwarding on an SSH connection"
      - "Connect without a local X server running"
    expected:
      - "SSH connects with graceful degradation"
    verification: manual

  # --- SSH monitoring in status bar (PR #114, #115) ---

  - id: MT-SSH-23
    name: "High values show warning/critical colors"
    pr: 115
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Connect monitoring to a server with high CPU/memory usage"
      - "Or observe the color thresholds"
    expected:
      - "Yellow at >= 70%, red at >= 90%"
    verification: manual
    tags: [visual]

  # --- Disconnect overlay: view mode + reconnect feedback (feature/terminal-disconnect-overlay) ---

  - id: MT-SSH-24
    name: "Disconnect overlay view mode: browse scrollback after dismiss"
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Open an SSH session and let some output accumulate"
      - "Kill the SSH server / disconnect the network to trigger an abrupt disconnect"
      - "Wait for the disconnect overlay ('Session disconnected') to appear"
      - "Click 'View Scrollback' (or the × button)"
    expected:
      - "Overlay disappears and a thin yellow banner appears at the bottom reading 'Session ended'"
      - "All previous terminal output is visible and selectable"
      - "Text can be copied from the terminal normally"
    verification: manual

  - id: MT-SSH-25
    name: "View mode: Enter key triggers reconnect prompt"
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Be in view mode (MT-SSH-24 complete — thin banner visible)"
      - "Click anywhere in the terminal area and press Enter"
    expected:
      - "A small dialog appears: 'This session has ended. Would you like to reconnect?'"
      - "Dialog has 'Reconnect' and 'Stay in View Mode' buttons"
      - "Clicking 'Stay in View Mode' closes the dialog and returns to view mode"
      - "Clicking 'Reconnect' starts a new session and opens a fresh terminal"
    verification: manual

  - id: MT-SSH-26
    name: "Reconnect failure shows error details"
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Open an SSH tab, then stop the SSH server so it becomes unreachable"
      - "Wait for the disconnect overlay to appear"
      - "Click 'Reconnect' (the blue button)"
    expected:
      - "The reconnect attempt fails (server is down)"
      - "The spawn-error overlay appears showing the error reason (e.g. 'Connection refused')"
      - "A 'Retry' button is present to try again"
    verification: manual

  # --- Connecting overlay + retry (feature/terminal-connect-overlay) ---

  - id: MT-SSH-36
    name: "Connecting overlay shown while SSH session is being established"
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "Open a new SSH tab pointing to a reachable server"
      - "Observe the terminal area immediately after opening"
    expected:
      - "A 'Connecting…' spinner overlay covers the terminal while the handshake is in progress"
      - "A 'Cancel' button is visible in the overlay"
      - "The overlay disappears automatically as soon as the session is established"
      - "Normal terminal output appears after the overlay closes"
    verification: manual

  - id: MT-SSH-37
    name: "Failed SSH connection shows error overlay with Retry"
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Create an SSH connection pointing to an unreachable host (e.g. wrong port or host down)"
      - "Open the tab and wait for the connection attempt to fail"
    expected:
      - "The 'Connection failed' overlay appears with the error message"
      - "Both a 'Retry' button and a 'Cancel' button are present"
      - "Clicking 'Retry' retries the connection and shows the spinner again"
      - "Clicking 'Cancel' closes the tab entirely"
    verification: manual
