category: embedded-services
display_name: "Embedded Network Services"

tests:
  - id: MT-SVC-01
    name: "Create and start an HTTP server"
    platforms: [linux, macos, windows]
    prerequisites:
      - app: true
    verification: manual
    steps:
      - Click the Services icon (server icon) in the activity bar
      - Click "+ New Service"
      - Set Name="Test HTTP", Protocol=HTTP, Root Directory to any local directory, Port=8080
      - Click Save
      - Click the play button on the new server item
      - Verify the status dot turns green and "running" state is shown
      - Open a browser and navigate to http://127.0.0.1:8080 — directory listing should appear
      - Click the stop button and verify the dot returns to grey
    added_by: "#526"

  - id: MT-SVC-02
    name: "Share via HTTP from File Browser right-click"
    platforms: [linux, macos, windows]
    prerequisites:
      - app: true
      - local shell tab open: true
    verification: manual
    steps:
      - Switch to the File Browser sidebar
      - Right-click any local directory
      - Select "Share via HTTP Server" from the context menu
      - Verify the sidebar switches to Services automatically
      - Verify a new server entry appears with status "running"
      - Open a browser to the shown port and confirm the directory is served
    added_by: "#526"

  - id: MT-SVC-03
    name: "Status bar running services indicator"
    platforms: [linux, macos, windows]
    prerequisites:
      - app: true
      - at least one embedded server running: true
    verification: manual
    steps:
      - Start an embedded server (any protocol) from the Services panel
      - Verify a server icon with a count badge appears in the status bar left section
      - Click the indicator and verify the Services sidebar panel opens
      - Stop all servers and verify the indicator disappears
    added_by: "#526"

  - id: MT-SVC-04
    name: "FTP server basic transfer"
    platforms: [linux, macos, windows]
    prerequisites:
      - app: true
      - ftp client available (e.g. lftp, curl, or FileZilla): true
    verification: manual
    steps:
      - Create an FTP server on port 2121 pointing to a directory with test files
      - Start the server
      - Connect with an FTP client: ftp://127.0.0.1:2121
      - Verify directory listing returns file names
      - Download a file and verify contents match the original
    added_by: "#526"

  - id: MT-SVC-05
    name: "TFTP server read request"
    platforms: [linux, macos, windows]
    prerequisites:
      - app: true
      - tftp client available (e.g. tftp or tftp-hpa): true
    verification: manual
    steps:
      - Create a TFTP server on port 6969 pointing to a directory with a small text file
      - Start the server
      - Run: tftp 127.0.0.1 6969 -c get <filename>
      - Verify the file is downloaded and contents match
    added_by: "#526"

  - id: MT-SVC-06
    name: "Auto-start on application launch"
    platforms: [linux, macos, windows]
    prerequisites:
      - app: true
    verification: manual
    steps:
      - Create an HTTP server and enable "Auto-start" in its settings
      - Quit and relaunch the application
      - Open the Services panel
      - Verify the server starts automatically within a few seconds of app launch
    added_by: "#526"
