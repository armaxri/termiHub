category: file-browser
display_name: "File Browser"

tests:
  # --- Automated: local browse and navigation (Issue #460) ---

  - id: MT-FB-01
    name: "Browse local files"
    platforms: [linux, windows]
    prerequisites:
      - app: true
    verification: automated
    automated_by: tests/e2e/file-browser-local.test.js
    notes: >
      Migrated to E2E in issue #460. Covers: toolbar visible when local terminal
      is active, current path displayed, file entries listed for the CWD.

  - id: MT-FB-02
    name: "Navigate directories"
    platforms: [linux, windows]
    prerequisites:
      - app: true
    verification: automated
    automated_by: tests/e2e/file-browser-local.test.js
    notes: >
      Migrated to E2E in issue #460. Covers: Up button updates path, double-click
      enters a subdirectory and shows its contents, round-trip up-and-back-down
      restores the original path.

  - id: MT-FB-04
    name: "Open in VS Code from file browser"
    pr: 51
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Right-click a file > 'Open in VS Code' (VS Code must be installed)"
    expected:
      - "File opens in VS Code"
    verification: manual

  # --- File browser follows tab switch from WSL to PowerShell (PR #167) ---

  - id: MT-FB-07
    name: "WSL tab — file browser shows WSL path"
    pr: 167
    platforms: [windows]
    prerequisites:
      - app: true
    instructions:
      - "Open a WSL tab"
      - "Check the file browser path"
    expected:
      - "File browser shows //wsl$/<distro>/home/<user>"
    verification: manual

  - id: MT-FB-08
    name: "PowerShell tab — file browser shows Windows home"
    pr: 167
    platforms: [windows]
    prerequisites:
      - app: true
    instructions:
      - "Open a PowerShell tab"
      - "Check the file browser path"
    expected:
      - "File browser switches to Windows home directory"
    verification: manual

  - id: MT-FB-09
    name: "Switch back to WSL — file browser returns"
    pr: 167
    platforms: [windows]
    prerequisites:
      - app: true
    instructions:
      - "Switch back to the WSL tab"
      - "Check the file browser path"
    expected:
      - "File browser returns to WSL path"
    verification: manual

  - id: MT-FB-10
    name: "Bash tab — file browser shows home directory"
    pr: 167
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Open a bash tab (no OSC 7)"
      - "Check the file browser path"
    expected:
      - "File browser shows home directory, not previous tab's path"
    verification: manual

  # --- New File button (PR #58) ---

  - id: MT-FB-12
    name: "New File button in SFTP mode"
    pr: 58
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "In SFTP file browser mode, click 'New File'"
    expected:
      - "New file creation works in SFTP mode"
    verification: manual

  # --- Open in VS Code (PR #51) ---

  - id: MT-FB-14
    name: "Open in VS Code — local mode"
    pr: 51
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "In local file browser, right-click a file"
      - "Click 'Open in VS Code'"
    expected:
      - "File opens in VS Code"
    verification: manual

  - id: MT-FB-15
    name: "Open in VS Code — SFTP edit and re-upload"
    pr: 51
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "In SFTP file browser, right-click a file"
      - "Click 'Open in VS Code'"
      - "Edit the file in VS Code and close the tab"
    expected:
      - "File re-uploaded (verify content changed on remote)"
    verification: manual

  - id: MT-FB-16
    name: "VS Code not installed — menu item hidden"
    pr: 51
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "On a system without VS Code installed"
      - "Right-click a file in file browser"
    expected:
      - "'Open in VS Code' menu item does not appear"
    verification: manual

  # --- Editor: Built-in file editor with Monaco (PR #54) ---

  - id: MT-FB-20
    name: "Editor tab drag-and-drop between panels"
    pr: 54
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Open an editor tab"
      - "Drag it between panels in split view"
    expected:
      - "Drag-and-drop works correctly"
    verification: manual
