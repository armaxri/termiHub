category: serial
display_name: "Serial"

tests:
  # --- Nerd Font / Powerline glyph support (PR #131) ---

  - id: MT-SER-01
    name: "Powerline glyphs render in SSH with agnoster"
    pr: 131
    platforms: [all]
    prerequisites:
      - app: true
      - docker: true
    instructions:
      - "SSH to a host running zsh with the agnoster theme"
      - "Observe the prompt glyphs"
    expected:
      - "Powerline glyphs render correctly instead of boxes"
    verification: manual
    tags: [visual]

  - id: MT-SER-02
    name: "Glyphs render on clean Windows without Nerd Font"
    pr: 131
    platforms: [windows]
    prerequisites:
      - app: true
    instructions:
      - "On a clean Windows machine without any Nerd Font installed locally"
      - "Open a terminal and verify font rendering"
    expected:
      - "Bundled Nerd Font renders glyphs correctly"
    verification: manual
    tags: [visual]

  # --- Serial connection error overlay (feature/terminal-connect-overlay) ---

  - id: MT-SER-03
    name: "Serial port not found shows descriptive error overlay"
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Create a serial connection pointing to a port that does not exist (e.g. /dev/ttyUSB99)"
      - "Open the tab"
    expected:
      - "The 'Connection failed' overlay appears"
      - "Error message contains 'Serial port not found' and the port path"
      - "A 'Retry' button and a 'Cancel' button are shown"
    verification: manual

  - id: MT-SER-04
    name: "Serial port permission denied shows dialout hint"
    platforms: [linux]
    prerequisites:
      - app: true
    instructions:
      - "Create a serial connection to a port the current user lacks permission to open"
      - "Open the tab (do not add the user to the dialout group beforehand)"
    expected:
      - "The 'Connection failed' overlay appears"
      - "Error message contains 'Permission denied' and mentions the 'dialout' group"
      - "A 'Retry' button and a 'Cancel' button are shown"
    verification: manual

  # --- Configurable serial port scan prefixes (PR #TODO) ---

  - id: MT-SER-06
    name: "Serial port scan prefixes appear in Settings → General"
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Open Settings (gear icon in the Activity Bar)"
      - "Navigate to General"
      - "Scroll to the 'Serial Port Scan Prefixes' section"
    expected:
      - "The section shows a badge with the count of enabled / total prefixes (e.g. '42 / 42 enabled')"
      - "A list of built-in prefixes is shown, each with a toggle switch"
      - "An 'Add' input and button are present at the bottom"
    verification: manual
    tags: [settings, serial]

  - id: MT-SER-07
    name: "Disabling a prefix removes its ports from the serial dropdown"
    platforms: [linux]
    prerequisites:
      - app: true
      - hardware: "A Linux machine with at least one /dev/ttyS* device present"
    instructions:
      - "Open Settings → General → Serial Port Scan Prefixes"
      - "Toggle the 'ttyS' prefix off"
      - "Open a connection editor for a Serial connection type"
      - "Click the Port dropdown"
    expected:
      - "No /dev/ttyS* ports appear in the dropdown"
      - "Toggle 'ttyS' back on; re-open the dropdown — the ports reappear"
    verification: manual
    tags: [settings, serial]

  - id: MT-SER-08
    name: "Adding a custom prefix discovers matching ports"
    platforms: [linux]
    prerequisites:
      - app: true
      - hardware: "A Linux machine with a device matching a non-default /dev prefix (e.g. create a test symlink: sudo ln -s /dev/null /dev/ttyTEST0)"
    instructions:
      - "Open Settings → General → Serial Port Scan Prefixes"
      - "Type 'ttyTEST' in the add-prefix input and click Add"
      - "Open a connection editor for a Serial connection type"
      - "Click the Port dropdown"
    expected:
      - "The custom prefix 'ttyTEST' appears in the list with a delete button"
      - "/dev/ttyTEST0 appears in the port dropdown"
      - "Deleting the custom prefix and reopening the dropdown removes the port"
    verification: manual
    tags: [settings, serial]

  - id: MT-SER-05
    name: "Serial port busy shows 'already in use' hint"
    platforms: [all]
    prerequisites:
      - app: true
    instructions:
      - "Open a serial port with another application (e.g. screen, minicom, or another termiHub tab)"
      - "Try to open a second termiHub tab to the same port"
    expected:
      - "The 'Connection failed' overlay appears on the second tab"
      - "Error message contains 'already in use'"
      - "A 'Retry' button and a 'Cancel' button are shown"
    verification: manual
